# ============================================
# RENDER DEPLOYMENT — pool2026prm
# ============================================
# IMPORTANTE: Se o servico foi criado manualmente (nao via Blueprint),
# voce precisa configurar no dashboard do Render:
#
# OPCAO A (recomendada): Root Directory = pool-intelligence-pro/backend
#   Build Command: npm install && npm run build
#   Start Command: npm start
#
# OPCAO B: Root Directory = pool-intelligence-pro
#   Build Command: npm run install:all && npm run build
#   Start Command: npm start
#
# Em AMBOS os casos, o backend auto-detecta e builda o frontend.
# NAO precisa de VITE_API_URL — DELETE essa env var se existir!
# ============================================

services:
  - type: web
    name: pool2026prm
    runtime: node
    region: oregon
    plan: free
    rootDir: pool-intelligence-pro/backend
    buildCommand: npm ci && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: pool-intelligence-db
          property: connectionString
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: THEGRAPH_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: pool-intelligence-db
    region: oregon
    # AÇÃO NECESSÁRIA: Fazer upgrade para plan: starter ($7/mês) no dashboard do Render
    # O plan free expira em 90 dias e deleta todos os dados automaticamente
    # plan: free  ← mudar para starter no dashboard, não aqui (requer billing)
    plan: free
    databaseName: poolintel
    user: poolintel
