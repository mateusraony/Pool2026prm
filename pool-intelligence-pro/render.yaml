# ============================================
# RENDER DEPLOYMENT — pool2026prm
# ============================================
# IMPORTANTE: Se o servico foi criado manualmente (nao via Blueprint),
# voce precisa configurar no dashboard do Render:
#
# OPCAO A (recomendada): Root Directory = pool-intelligence-pro/backend
#   Build Command: npm install && npm run build && npm run db:sync
#   Start Command: node dist/index.js
#
# OPCAO B: Root Directory = pool-intelligence-pro
#   Build Command: npm run install:all && npm run build && cd backend && npm run db:sync
#   Start Command: node pool-intelligence-pro/backend/dist/index.js
#
# Em AMBOS os casos, o backend auto-detecta e builda o frontend.
# NAO precisa de VITE_API_URL — DELETE essa env var se existir!
#
# NOTA: prisma db push fica no BUILD (nao no START) para evitar
# bloqueio na deteccao de porta pelo Render (port scan timeout).
# ============================================

services:
  - type: web
    name: pool2026prm
    runtime: node
    region: oregon
    plan: free
    rootDir: pool-intelligence-pro/backend
    buildCommand: npm ci && npm run build && npm run db:sync
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
        # Supabase Transaction Pooler (porta 6543, modo transaction)
        # Formato: postgresql://postgres.[ref]:[senha]@aws-0-[region].pooler.supabase.com:6543/postgres
      - key: DIRECT_URL
        sync: false
        # Supabase Direct Connection (porta 5432, para migrations/schema push)
        # Formato: postgresql://postgres:[senha]@db.[ref].supabase.co:5432/postgres
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: THEGRAPH_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
