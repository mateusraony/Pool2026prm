<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pool Intelligence Pro — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #818cf8; }
    p { color: #9ca3af; font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.6; }
    button {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌊</div>
    <h1>Voce esta offline</h1>
    <p>
      O Pool Intelligence Pro precisa de conexao com a internet para funcionar.
      Verifique sua conexao e tente novamente.
    </p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
